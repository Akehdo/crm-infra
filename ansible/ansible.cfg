[defaults]
# Default inventory for this project. The real host.yml is intentionally local
# and ignored by Git; copy inventories/prod/host.example.yml to host.yml first.
inventory = inventories/prod/host.yml

# Project-local roles live here. This keeps CRM roles separate from any global
# roles installed on the operator machine.
roles_path = roles

# False makes first-time provisioning of a fresh droplet smoother. For stricter
# production SSH trust, change this to True after you pin the host key.
host_key_checking = False

# Do not create *.retry files after failed runs; failures are visible in output.
retry_files_enabled = False

# Let Ansible discover Python on Ubuntu 24.04 without noisy warnings.
interpreter_python = auto_silent
